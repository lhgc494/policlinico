{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">

            <div class="card shadow-sm border-0">
                <div class="card-header bg-danger text-white">
                    <h5 class="mb-0">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i>
                        Confirmar eliminación
                    </h5>
                </div>

                <div class="card-body">
                    <p class="fs-5">
                        ¿Estás seguro que deseas eliminar al siguiente paciente?
                    </p>

                    <div class="alert alert-light border">
                        <strong>DNI:</strong> {{ paciente.dni }} <br>
                        <strong>Paciente:</strong> {{ paciente.nombres }} {{ paciente.apellidos }}
                    </div>

                    <div class="alert alert-warning">
                        ⚠️ Esta acción <strong>no se puede deshacer</strong>.
                    </div>

                    <form method="post" class="d-flex justify-content-end">
                        {% csrf_token %}
                        <a href="{% url 'lista_pacientes' %}" class="btn btn-outline-secondary me-2">
                            Cancelar
                        </a>
                        <button type="submit" class="btn btn-danger">
                            <i class="bi bi-trash me-1"></i>
                            Sí, eliminar paciente
                        </button>
                    </form>
                </div>
            </div>

        </div>
    </div>
</div>
{% endblock %}
