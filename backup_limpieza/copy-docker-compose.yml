version: '3.8'

services:
  db:
    image: postgres:14
    container_name: policlinico_db
    restart: always
    environment:
      POSTGRES_DB: policlinico_db
      POSTGRES_USER: policlinico_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U policlinico_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: policlinico_web
    restart: always
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ../:/app
      - ../fixtures:/app/fixtures  # 👈 MONTAR DIRECTORIO DE FIXTURES
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - ../entrypoint.sh:/entrypoint.sh  # 👈 MONTAR ENTRYPOINT
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings_production
      DJANGO_SECRET_KEY: policlinico2026
      DB_NAME: policlinico_db
      DB_USER: policlinico_user
      DB_PASSWORD: tu_password_seguro
      DB_HOST: db
      DB_PORT: 5432
      DJANGO_SUPERUSER_PASSWORD: admin123
      PYTHONUNBUFFERED: 1
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["/entrypoint.sh"]  # 👈 USA EL ENTRYPOINT CREADO

volumes:
  postgres_data:
  static_volume:
  media_volume: